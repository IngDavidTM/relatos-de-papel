spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/users_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}

security:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    com.relatosdepapel: INFO
    org.hibernate.SQL: WARN

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
