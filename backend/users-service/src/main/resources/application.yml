server:
  port: ${PORT:8083}

spring:
  application:
    name: users-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/users_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:relatos_user}
    password: ${DB_PASSWORD:relatos_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

security:
  jwt:
    # En producción debe inyectarse por variable de entorno. Mínimo 32 bytes para HS256.
    secret: ${JWT_SECRET:relatos-de-papel-super-secret-key-change-in-prod-please-256}
    expiration-seconds: ${JWT_EXPIRATION:3600}
    issuer: relatos-de-papel

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.relatosdepapel: DEBUG
    org.hibernate.SQL: DEBUG
