spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE,USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

security:
  jwt:
    secret: test-secret-key-for-relatos-de-papel-unit-tests-256-bits-long
    expiration-seconds: 3600
    issuer: relatos-de-papel

eureka:
  client:
    enabled: false
